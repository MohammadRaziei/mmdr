name: Build and Publish mmdr

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - master
    tags:
      - "v*"

env:
  FORCE_COLOR: 3

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ---------------------------------------------------------------------------
  # Build wheels for every platform / arch
  # ---------------------------------------------------------------------------

  linux:
    name: Linux (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v4

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          manylinux: auto
          args: --release --out dist -m pyproject.toml

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.target }}
          path: dist/*.whl
          overwrite: false

  windows:
    name: Windows (${{ matrix.target }})
    runs-on: windows-latest
    strategy:
      matrix:
        target: [x64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          architecture: ${{ matrix.target }}

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist -m pyproject.toml

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-${{ matrix.target }}
          path: dist/*.whl
          overwrite: false

  macos:
    name: macOS (${{ matrix.target }})
    runs-on: macos-latest
    strategy:
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v4

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist -m pyproject.toml

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-${{ matrix.target }}
          path: dist/*.whl
          overwrite: false

  sdist:
    name: Source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist -m pyproject.toml

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: dist/*.tar.gz
          overwrite: false

  # ---------------------------------------------------------------------------
  # Test — install the built wheel on every OS and run pytest
  # ---------------------------------------------------------------------------

  test:
    name: Test (${{ matrix.os }})
    needs: [linux, windows, macos]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download wheels
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Install wheel
        shell: bash
        run: |
          pip install --no-index --upgrade --find-links ./dist mmdr
          pip install pytest

      - name: Run tests
        run: pytest tests/ -v

  # ---------------------------------------------------------------------------
  # Release — create GitHub release + publish to PyPI on tags
  # ---------------------------------------------------------------------------

  release:
    name: Release
    needs: [test, sdist]
    runs-on: ubuntu-latest

    permissions:
      contents: write   # needed to create GitHub releases
      id-token: write   # needed for PyPI Trusted Publishing

    steps:
      - name: Determine release name
        id: meta
        run: |
          if [[ "${{ github.ref }}" =~ ^refs/tags/v.*$ ]]; then
            echo "release_name=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
            echo "is_tag=true"                           >> $GITHUB_OUTPUT
            echo "prerelease=false"                      >> $GITHUB_OUTPUT
          else
            echo "release_name=__beta__"                 >> $GITHUB_OUTPUT
            echo "is_tag=false"                          >> $GITHUB_OUTPUT
            echo "prerelease=true"                       >> $GITHUB_OUTPUT
          fi
        shell: bash

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -lh dist/

      - name: Create or update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name:   ${{ steps.meta.outputs.release_name }}
          name:       ${{ steps.meta.outputs.release_name }}
          draft:      false
          prerelease: ${{ steps.meta.outputs.prerelease }}
          files:      dist/*
          token:      ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to PyPI
        if: steps.meta.outputs.is_tag == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          skip-existing: true
          