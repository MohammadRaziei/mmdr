name: Build and Publish mmdr

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - master
    tags:
      - "v*"

env:
  FORCE_COLOR: 3

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ---------------------------------------------------------------------------
  # Build wheels for every platform / arch
  # ---------------------------------------------------------------------------

  build:
    name: Build (${{ matrix.os }} · ${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest  
            target: x86_64   
            manylinux: auto
          - os: ubuntu-latest  
            target: aarch64  
            manylinux: auto
          - os: windows-latest 
            target: x64
          - os: macos-latest   
            target: x86_64
          - os: macos-latest   
            target: aarch64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          target:     ${{ matrix.target }}
          manylinux:  ${{ matrix.manylinux }}
          args:       --release --out dist -m pyproject.toml

      - uses: actions/upload-artifact@v4
        with:
          name:      wheels-${{ matrix.os }}-${{ matrix.target }}
          path:      dist/*.whl
          overwrite: false

  sdist:
    name: Source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args:    --out dist -m pyproject.toml

      - uses: actions/upload-artifact@v4
        with:
          name:      wheels-sdist
          path:      dist/*.tar.gz
          overwrite: false

  # ---------------------------------------------------------------------------
  # Test — install the built wheel on every OS and run pytest
  # ---------------------------------------------------------------------------

  test:
    name: Test (${{ matrix.os }})
    needs: [build]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/download-artifact@v4
        with:
          path:           dist
          merge-multiple: true

      - name: Install wheel + test deps
        shell: bash
        run: |
          pip install --no-index --upgrade --find-links ./dist mmdr
          pip install pytest

      - name: Run tests
        run: pytest tests/ -v

  # ---------------------------------------------------------------------------
  # Release — GitHub release + PyPI on tags
  # ---------------------------------------------------------------------------

  release:
    name: Release
    needs: [test, sdist]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Determine release name
        id: meta
        shell: bash
        run: |
          if [[ "${{ github.ref }}" =~ ^refs/tags/v.*$ ]]; then
            echo "release_name=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
            echo "is_tag=true"                           >> $GITHUB_OUTPUT
            echo "prerelease=false"                      >> $GITHUB_OUTPUT
          else
            echo "release_name=__beta__"                 >> $GITHUB_OUTPUT
            echo "is_tag=false"                          >> $GITHUB_OUTPUT
            echo "prerelease=true"                       >> $GITHUB_OUTPUT
          fi

      - uses: actions/download-artifact@v4
        with:
          path:           dist
          merge-multiple: true

      - name: List artifacts
        run: ls -lh dist/

      - name: Create or update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name:   ${{ steps.meta.outputs.release_name }}
          name:       ${{ steps.meta.outputs.release_name }}
          draft:      false
          prerelease: ${{ steps.meta.outputs.prerelease }}
          files:      dist/*
          token:      ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to PyPI
        if: steps.meta.outputs.is_tag == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          skip-existing: true
